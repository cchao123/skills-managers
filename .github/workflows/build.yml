name: Build Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.4). 留空则用当前 ref 名称'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            arch: x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64

    runs-on: ${{ matrix.platform }}
    env:
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: pnpm tauri build --target ${{ matrix.target }} --bundles app

      - name: Re-sign and package (macOS, no Apple account)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="${TAG_NAME#v}"
          mkdir -p dist

          APP_PATH="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name "*.app" | head -n 1)"
          test -n "$APP_PATH"

          APP_NAME="$(basename "$APP_PATH" .app)"

          # 先移除可能异常的签名，再做 ad-hoc 深签名
          codesign --remove-signature "$APP_PATH" || true
          codesign --force --deep --sign - --options runtime --timestamp=none "$APP_PATH"

          # 验证签名（spctl 可能仍 rejected，这是正常的：未公证）
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl -a -vv "$APP_PATH" || true

          # 产出 app.tar.gz
          tar -C "$(dirname "$APP_PATH")" -czf "dist/${APP_NAME}_${VERSION}_${{ matrix.arch }}.app.tar.gz" "$(basename "$APP_PATH")"

          # 产出 dmg（带 Applications 快捷方式）
          STAGE_DIR="$(mktemp -d)"
          cp -R "$APP_PATH" "$STAGE_DIR/"
          ln -s /Applications "$STAGE_DIR/Applications"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGE_DIR" \
            -ov \
            -format UDZO \
            "dist/${APP_NAME}_${VERSION}_${{ matrix.arch }}.dmg"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          pnpm tauri build --target ${{ matrix.target }} --bundles nsis,msi
          mkdir -p dist
          cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe dist/ || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi dist/ || true

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: bundle-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Skills Manager ${{ env.TAG_NAME }}
          body: See the assets to download and install this version.
          draft: true
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
